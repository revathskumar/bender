app-id: com.revathskumar.bender
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
command: com.revathskumar.bender
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
  - org.freedesktop.Sdk.Extension.typescript

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --filesystem=xdg-config/bender:ro

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  - "*.a"
  - "*.la"

modules:
  - name: bender
    buildsystem: meson
    build-options:
      append-path: "/usr/lib/sdk/typescript/bin:/usr/lib/sdk/node24/bin"
    build-commands:
      - npm i
      - npm run build
    config-opts:
      - --buildtype=release
    sources:
      - type: dir
        path: .
